<!DOCTYPE html>
<html>
    <head>
        <title>Login - Medinexus</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Inter&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    <body style="background: linear-gradient(135deg,#4facfe,#00f2fe); height: 100vh; ">
         <h1 class="text-center" style="color: hwb(310 16% 35%); font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;">Medinexus</h1>
         <div style="display: flex; justify-content: center; align-items: center; height: 80vh;">
            <div class="loginbox shadow-lg rounded-4 bg-white text-center p-4 ms-auto me-auto" style="width: 300px; ">
            <div class="container">
               <div class="text-center">
                <h2 class="mb-4 fw-bold">Login</h2>
                <input type="text" class="form-control mb-3 p-3" placeholder="Username">
                <input type="password" class="form-control mb-3 p-3 " placeholder="Password">
                <button class="btn btn-primary btn-lg" onclick="window.location.href='menu.html'">Login</button><br>
                <a href="register.html">Don't have an account? Register here</a>
               </div>
            </div>
         </div>
         </div>
    </body>
